name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -t events-api:latest .
      - name: Run Docker Container
        run: docker run --rm -p 5000:5000 --name events-api-container events-api:latest &
      - name: Wait for the app to start
        run: sleep 3
      - name: HTTP Check
        run: curl http://localhost:5000/api/health
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -v
      - name: Cleanup
        if: always()
        run: docker container stop events-api-container